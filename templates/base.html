<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BillingPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --bg:           #08060f;
            --bg-card:      #100e1d;
            --bg-elevated:  #18152b;
            --bg-hover:     #1f1b36;
            --border:       #2a2448;
            --border-soft:  #1d1a30;

            --accent:       #8b5cf6;
            --accent-2:     #a78bfa;
            --accent-3:     #c4b5fd;
            --accent-glow:  rgba(139,92,246,.28);
            --accent-glow2: rgba(139,92,246,.12);

            --green:        #10b981;
            --green-glow:   rgba(16,185,129,.2);
            --amber:        #f59e0b;
            --red:          #ef4444;
            --pink:         #ec4899;

            --text:         #ede9fe;
            --text-muted:   #7c6fa0;
            --text-dim:     #3d3560;

            --radius:       16px;
            --radius-sm:    10px;
            --shadow:       0 8px 32px rgba(0,0,0,.55);
            --shadow-glow:  0 0 40px var(--accent-glow);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 90% 55% at 15% -10%, rgba(139,92,246,.13) 0%, transparent 55%),
                radial-gradient(ellipse 60% 50% at 85% 110%,  rgba(167,139,250,.08) 0%, transparent 55%);
            pointer-events: none; z-index: 0;
        }

        /* ── TOP BAR ── */
        .top-bar {
            position: sticky; top: 0; z-index: 1000;
            height: 58px;
            background: rgba(8,6,15,.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 1.75rem; gap: 1rem;
        }

        .brand { display:flex; align-items:center; gap:.6rem; text-decoration:none; flex-shrink:0; }

        .brand-mark {
            width:32px; height:32px; border-radius:9px;
            background: linear-gradient(135deg, var(--accent), #6d28d9);
            display:flex; align-items:center; justify-content:center;
            font-size:.9rem;
            box-shadow: 0 0 18px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,.15);
        }

        .brand-name {
            font-family:'Syne',sans-serif; font-weight:800;
            font-size:1.15rem; color:var(--text); letter-spacing:-.4px;
        }
        .brand-name span { color: var(--accent-2); }

        .top-right { display:flex; align-items:center; gap:.65rem; }

        .user-chip {
            display:flex; align-items:center; gap:.5rem;
            background:var(--bg-elevated); border:1px solid var(--border);
            border-radius:100px; padding:.28rem .85rem .28rem .35rem;
            font-size:.8rem; color:var(--text-muted);
            transition: border-color .2s;
        }
        .user-chip:hover { border-color: var(--accent); }

        .user-avatar {
            width:26px; height:26px; border-radius:50%;
            background: linear-gradient(135deg, var(--accent), #6d28d9);
            display:flex; align-items:center; justify-content:center;
            font-size:.7rem; font-weight:700; color:#fff;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .logout-btn {
            display:inline-flex; align-items:center; gap:.35rem;
            background:transparent; border:1px solid rgba(239,68,68,.35);
            color:#f87171; font-size:.78rem; font-family:'DM Sans',sans-serif;
            padding:.3rem .9rem; border-radius:100px; cursor:pointer;
            transition: all .2s; text-decoration:none;
        }
        .logout-btn:hover { background:rgba(239,68,68,.12); border-color:var(--red); color:#fca5a5; }

        /* ── SUB NAV ── */
        .sub-nav {
            position: sticky; top: 58px; z-index: 999;
            background: rgba(10,8,18,.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-soft);
            display: flex; align-items: center; gap: .3rem;
            padding: .55rem 1.75rem;
            overflow-x: auto; scrollbar-width: none;
        }
        .sub-nav::-webkit-scrollbar { display:none; }

        .nav-pill {
            display:inline-flex; align-items:center; gap:.42rem;
            padding:.36rem .95rem; border-radius:100px;
            font-size:.8rem; font-weight:500;
            color:var(--text-muted); text-decoration:none;
            white-space:nowrap; border:1px solid transparent;
            transition: all .2s;
        }
        .nav-pill i { font-size:.88rem; }
        .nav-pill:hover { color:var(--text); background:var(--bg-hover); border-color:var(--border); }
        .nav-pill.active {
            background: linear-gradient(135deg, rgba(139,92,246,.22), rgba(109,40,217,.18));
            border-color: rgba(139,92,246,.45);
            color: var(--accent-3);
            box-shadow: 0 0 18px rgba(139,92,246,.18);
        }

        /* ── PAGE ── */
        .page-wrap {
            position:relative; z-index:1;
            max-width:1920px; margin:0 auto;
            padding: 2rem 2.5rem 3rem;
            animation: fadeSlide .4s ease both;
        }

        @keyframes fadeSlide {
            from { opacity:0; transform:translateY(14px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* ── TYPOGRAPHY ── */
        .page-title {
            font-family:'Syne',sans-serif; font-weight:800;
            font-size:1.65rem; color:var(--text);
            letter-spacing:-.5px; line-height:1.15;
        }
        .page-sup { font-size:.72rem; text-transform:uppercase; letter-spacing:1.2px; color:var(--text-muted); margin-bottom:.35rem; }
        .page-sup a { color:var(--text-muted); text-decoration:none; }
        .page-sup a:hover { color:var(--accent-2); }
        .section-title { font-family:'Syne',sans-serif; font-weight:700; font-size:.95rem; color:var(--text); }

        /* ── CARDS ── */
        .bp-card {
            background:var(--bg-card); border:1px solid var(--border);
            border-radius:var(--radius); padding:1.5rem;
            box-shadow:var(--shadow); transition: border-color .25s;
        }
        .bp-card:hover { border-color: #352e5a; }

        /* ── STAT CARDS ── */
        .stat-card {
            background:var(--bg-card); border:1px solid var(--border);
            border-radius:var(--radius); padding:1.4rem 1.5rem;
            position:relative; overflow:hidden;
            transition: transform .25s, box-shadow .25s, border-color .25s;
            animation: fadeSlide .5s ease both;
        }
        .stat-card:nth-child(1){animation-delay:.05s}
        .stat-card:nth-child(2){animation-delay:.1s}
        .stat-card:nth-child(3){animation-delay:.15s}
        .stat-card:nth-child(4){animation-delay:.2s}
        .stat-card:hover { transform:translateY(-4px); box-shadow:var(--shadow-glow); border-color:rgba(139,92,246,.4); }

        .stat-icon-box {
            width:40px; height:40px; border-radius:10px;
            display:flex; align-items:center; justify-content:center;
            font-size:1.1rem; margin-bottom:.75rem;
        }
        .stat-label { font-size:.72rem; text-transform:uppercase; letter-spacing:1.1px; color:var(--text-muted); margin-bottom:.3rem; }
        .stat-value { font-family:'Syne',sans-serif; font-weight:800; font-size:2rem; line-height:1; letter-spacing:-1px; }

        /* ── NAV QUICK CARDS ── */
        .nav-card {
            display:flex; flex-direction:column; align-items:center;
            justify-content:center; gap:.55rem;
            padding:1.3rem .75rem 1.1rem;
            background:var(--bg-card); border:1px solid var(--border);
            border-radius:var(--radius); text-decoration:none;
            color:var(--text-muted); text-align:center;
            transition: all .22s;
        }
        .nav-card:hover {
            border-color: rgba(139,92,246,.5); color:var(--text);
            background:var(--bg-elevated);
            box-shadow: 0 0 24px var(--accent-glow2), 0 4px 16px rgba(0,0,0,.3);
            transform: translateY(-3px);
        }
        .nc-icon {
            width:46px; height:46px; border-radius:13px;
            display:flex; align-items:center; justify-content:center;
            font-size:1.2rem; transition: transform .22s;
        }
        .nav-card:hover .nc-icon { transform: scale(1.1); }
        .nc-label { font-size:.78rem; font-weight:500; line-height:1.3; }

        /* ── TABLES ── */
        .bp-table { width:100%; border-collapse:separate; border-spacing:0; }
        .bp-table thead th {
            background:var(--bg-elevated); color:var(--text-muted);
            font-size:.7rem; text-transform:uppercase; letter-spacing:1.1px;
            padding:.7rem 1rem; border-bottom:1px solid var(--border);
            font-weight:600; white-space:nowrap;
        }
        .bp-table thead th:first-child { border-radius:var(--radius-sm) 0 0 0; }
        .bp-table thead th:last-child  { border-radius:0 var(--radius-sm) 0 0; }
        .bp-table tbody td { padding:.8rem 1rem; border-bottom:1px solid var(--border-soft); font-size:.86rem; vertical-align:middle; }
        .bp-table tbody tr { transition:background .15s; }
        .bp-table tbody tr:hover { background:var(--bg-hover); }
        .bp-table tbody tr:last-child td { border-bottom:none; }

        /* ── FORMS ── */
        .bp-label {
            display:block; font-size:.72rem; font-weight:600;
            text-transform:uppercase; letter-spacing:.9px;
            color:var(--text-muted); margin-bottom:.45rem;
        }

        input[type=text], input[type=number], input[type=date],
        input[type=email], input[type=tel], input[type=password],
        select, textarea, .form-control, .form-select {
            background: var(--bg-elevated) !important;
            border: 1px solid var(--border) !important;
            color: var(--text) !important;
            border-radius: var(--radius-sm) !important;
            padding: .62rem 1rem !important;
            font-size: .87rem !important;
            font-family: 'DM Sans', sans-serif !important;
            transition: border-color .2s, box-shadow .2s !important;
            width: 100%;
        }

        input:focus, select:focus, textarea:focus,
        .form-control:focus, .form-select:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px var(--accent-glow2) !important;
            outline: none !important;
            background: var(--bg-hover) !important;
        }

        input::placeholder, textarea::placeholder { color: var(--text-dim) !important; }
        select option, .form-select option { background:#1a1530; color:var(--text); }

        /* ── BUTTONS ── */
        .bp-btn {
            display:inline-flex; align-items:center; gap:.45rem;
            padding:.58rem 1.3rem; border-radius:var(--radius-sm);
            font-size:.84rem; font-weight:500; cursor:pointer;
            transition:all .2s; border:none;
            font-family:'DM Sans',sans-serif;
            text-decoration:none; white-space:nowrap; line-height:1;
        }
        .bp-btn-primary {
            background: linear-gradient(135deg, var(--accent), #6d28d9);
            color:#fff; box-shadow: 0 4px 18px var(--accent-glow);
        }
        .bp-btn-primary:hover {
            background: linear-gradient(135deg, var(--accent-2), var(--accent));
            box-shadow: 0 6px 28px rgba(139,92,246,.45);
            color:#fff; transform:translateY(-1px);
        }
        .bp-btn-success {
            background: linear-gradient(135deg, var(--green), #059669);
            color:#fff; box-shadow: 0 4px 16px var(--green-glow);
        }
        .bp-btn-success:hover { box-shadow:0 6px 22px rgba(16,185,129,.35); color:#fff; transform:translateY(-1px); }
        .bp-btn-warning { background:linear-gradient(135deg,var(--amber),#d97706); color:#1a0f00; }
        .bp-btn-warning:hover { color:#1a0f00; transform:translateY(-1px); }
        .bp-btn-danger  { background:linear-gradient(135deg,var(--red),#dc2626); color:#fff; }
        .bp-btn-danger:hover  { color:#fff; transform:translateY(-1px); }
        .bp-btn-ghost {
            background:transparent; color:var(--text-muted);
            border:1px solid var(--border);
        }
        .bp-btn-ghost:hover { background:var(--bg-elevated); color:var(--text); border-color:rgba(139,92,246,.4); }

        /* ── BADGES ── */
        .bp-badge { display:inline-block; padding:.2rem .65rem; border-radius:100px; font-size:.7rem; font-weight:600; }
        .bp-badge-purple { background:rgba(139,92,246,.18); color:var(--accent-3); }
        .bp-badge-green  { background:rgba(16,185,129,.15);  color:#6ee7b7; }
        .bp-badge-amber  { background:rgba(245,158,11,.15);  color:#fcd34d; }
        .bp-badge-red    { background:rgba(239,68,68,.15);   color:#fca5a5; }
        .bp-badge-pink   { background:rgba(236,72,153,.15);  color:#f9a8d4; }

        /* ── ALERT ── */
        .bp-alert {
            display:flex; align-items:center; gap:.6rem;
            padding:.8rem 1.2rem; border-radius:var(--radius-sm);
            font-size:.86rem; margin-bottom:1.25rem; animation:fadeSlide .3s ease;
        }
        .bp-alert-success { background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.28); color:#6ee7b7; }

        /* ── MISC ── */
        .bp-hr { border:none; border-top:1px solid var(--border); margin:1.5rem 0; }
        .search-wrap { position:relative; }
        .search-wrap .si { position:absolute; left:.95rem; top:50%; transform:translateY(-50%); color:var(--text-muted); pointer-events:none; }
        .search-wrap input { padding-left:2.5rem !important; }

        ::-webkit-scrollbar { width:5px; height:5px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

        /* ── RESPONSIVE ── */
        @media(max-width:1199px){
            .page-wrap { padding:2rem 1.75rem 3rem; }
        }
        @media(max-width:767px){
            .top-bar   { padding:0 1rem; height:54px; }
            .sub-nav   { padding:.5rem 1rem; top:54px; }
            .page-wrap { padding:1.25rem 1rem 2rem; }
            .page-title{ font-size:1.35rem; }
            .stat-value{ font-size:1.65rem; }
        }
        @media(max-width:480px){
            .user-chip span { display:none; }
            .logout-btn span { display:none; }
        }
    </style>
</head>
<body>

<!-- TOP BAR -->
<header class="top-bar">
    <a class="brand" href="{% url 'dashboard' %}">
        <div class="brand-mark">💼</div>
        <span class="brand-name">Billing<span>Pro</span></span>
    </a>
    <div class="top-right">
        <div class="user-chip">
            <div class="user-avatar">{{ request.user.username|first|upper }}</div>
            <span>{{ request.user.username }}</span>
        </div>
        <form action="{% url 'logout' %}" method="POST" style="margin:0;">
            {% csrf_token %}
            <button type="submit" class="logout-btn">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </button>
        </form>
    </div>
</header>

<!-- SUB NAV -->
<nav class="sub-nav">
    <a href="{% url 'dashboard' %}" class="nav-pill {% if request.path == '/billing/' or 'dashboard' in request.path %}active{% endif %}">
        <i class="bi bi-grid-1x2-fill"></i> Dashboard
    </a>
    <a href="{% url 'invoice_list' %}" class="nav-pill {% if '/billing/invoices' in request.path %}active{% endif %}">
        <i class="bi bi-receipt"></i> Invoices
    </a>
    <a href="{% url 'create_invoice' %}" class="nav-pill {% if '/billing/create' in request.path %}active{% endif %}">
        <i class="bi bi-plus-circle-fill"></i> New Invoice
    </a>
    <a href="{% url 'product_list' %}" class="nav-pill {% if '/billing/products' in request.path and '/add' not in request.path %}active{% endif %}">
        <i class="bi bi-box-seam-fill"></i> Products
    </a>
    <a href="{% url 'add_product' %}" class="nav-pill {% if '/billing/products/add' in request.path %}active{% endif %}">
        <i class="bi bi-plus-square-fill"></i> Add Product
    </a>
    <a href="/billing/customers/" class="nav-pill {% if '/billing/customers' in request.path %}active{% endif %}">
        <i class="bi bi-people-fill"></i> Customers
    </a>
</nav>

<!-- PAGE -->
<main class="page-wrap">
    {% if messages %}
        {% for message in messages %}
        <div class="bp-alert bp-alert-success">
            <i class="bi bi-check-circle-fill"></i> {{ message }}
        </div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
