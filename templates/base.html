<!DOCTYPE html>
<html>
<head>
    <title>Billing System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container-fluid">

        <!-- 🔥 Brand -->
        <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">
            💼 BillingPro
        </a>

        <!-- Mobile toggle -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- 🔥 Left menu -->
            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/billing/' %}active{% endif %}" href="{% url 'dashboard' %}">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if '/billing/invoices' in request.path %}active{% endif %}" href="{% url 'invoice_list' %}">
                        Invoices
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if '/billing/create' in request.path %}active{% endif %}" href="{% url 'create_invoice' %}">
                        Create Invoice
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if '/billing/products' in request.path %}active{% endif %}" href="{% url 'product_list' %}">
                        Products
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if '/billing/products/add' in request.path %}active{% endif %}" href="{% url 'add_product' %}">
                        Add Product
                    </a>
                </li>
                <li class="nav-item">
    <a class="nav-link" href="/billing/customers/">Customers</a>
</li>
            </ul>

            <!-- 🔥 Right side -->
            <ul class="navbar-nav">

                <li class="nav-item">
                    <span class="nav-link text-light">
                        👤 {{ request.user.username }}
                    </span>
                </li>

                <li class="nav-item">
                    <form action="{% url 'logout' %}" method="POST" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-sm ms-2">
                            Logout
                        </button>
                    </form>
                </li>

            </ul>

        </div>
    </div>
</nav>

<div class="container mt-4">

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
