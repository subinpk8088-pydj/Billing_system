{% extends 'base.html' %}

{% block content %}

<div class="d-flex align-items-center justify-content-between mb-4">
    <div>
        <p class="page-sup">
            <a href="{% url 'product_list' %}">Products</a>
            <i class="bi bi-chevron-right" style="font-size:.6rem;margin:0 .3rem;"></i> Add
        </p>
        <h1 class="page-title">Add Product</h1>
    </div>
</div>

<div class="row">
    <div class="col-12 col-md-7 col-lg-5">
        <div class="bp-card">
            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="bp-label"><i class="bi bi-box-seam-fill me-1"></i>Product Name</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. Widget Pro" required>
                </div>
                <div class="mb-3">
                    <label class="bp-label"><i class="bi bi-currency-rupee me-1"></i>Price (₹)</label>
                    <input type="number" name="price" class="form-control" placeholder="0.00" step="0.01" required>
                </div>
                <div class="mb-4">
                    <label class="bp-label"><i class="bi bi-archive-fill me-1"></i>Stock Quantity</label>
                    <input type="number" name="stock" class="form-control" placeholder="0" required>
                </div>

                <div class="d-flex gap-2">
                    <button class="bp-btn bp-btn-primary" style="flex:1;justify-content:center;">
                        <i class="bi bi-plus-circle-fill"></i> Add Product
                    </button>
                    <a href="{% url 'product_list' %}" class="bp-btn bp-btn-ghost">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
