{% extends 'base.html' %}

{% block content %}

<div class="card shadow-lg border-0 p-4">

    <h2 class="text-center mb-4 fw-bold">🧾 Create Invoice</h2>

    <form method="POST">
        {% csrf_token %}

        <!-- CUSTOMER -->
        <div class="mb-3">
           <label>Customer</label>
{{ form.customer_input }}
        </div>

        <!-- TAX + DISCOUNT -->
        <div class="row">
            <div class="col-md-6">
                <label class="form-label">Tax</label>
                {{ form.tax }}
            </div>

            <div class="col-md-6">
                <label class="form-label">Discount</label>
                {{ form.discount }}
            </div>
        </div>

        <!-- ITEMS -->
        <h5 class="mt-4">🛒 Items</h5>

        <div id="items">
            <div class="row mb-2 align-items-center">
                <div class="col-md-6">
                    <select name="product" class="form-select product" onchange="calculateTotal()">
                        {% for product in products %}
                        <option value="{{ product.id }}" data-price="{{ product.price }}">
                            {{ product.name }} (₹{{ product.price }})
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4">
                    <input type="number" name="quantity" min="1"
                        class="form-control quantity"
                        placeholder="Qty"
                        oninput="calculateTotal()">
                </div>
            </div>
        </div>

        <button type="button" class="btn btn-outline-secondary mt-2" onclick="addItem()">
            + Add Item
        </button>

        <hr>

        <!-- TOTALS -->
        <div class="bg-light p-3 rounded">
            <h6>Subtotal: ₹<span id="subtotal">0.00</span></h6>
            <h5 class="fw-bold">Total: ₹<span id="total">0.00</span></h5>
        </div>

        <button class="btn btn-primary w-100 mt-3">Create Invoice</button>
    </form>

</div>

<script>
function addItem() {
    let html = `
        <div class="row mb-2 align-items-center">
            <div class="col-md-6">
                <select name="product" class="form-select product" onchange="calculateTotal()">
                    {% for product in products %}
                    <option value="{{ product.id }}" data-price="{{ product.price }}">
                        {{ product.name }} (₹{{ product.price }})
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-4">
                <input type="number" name="quantity" min="1"
                    class="form-control quantity"
                    placeholder="Qty"
                    oninput="calculateTotal()">
            </div>
        </div>
    `;
    document.getElementById('items').insertAdjacentHTML('beforeend', html);
}

function calculateTotal() {
    let subtotal = 0;

    document.querySelectorAll('#items .row').forEach(row => {
        let p = row.querySelector('.product');
        let q = row.querySelector('.quantity');

        if (p && q && q.value) {
            let price = parseFloat(p.options[p.selectedIndex].dataset.price);
            subtotal += price * q.value;
        }
    });

    let tax = parseFloat(document.getElementById("id_tax")?.value) || 0;
    let discount = parseFloat(document.getElementById("id_discount")?.value) || 0;

    let total = subtotal + tax - discount;

    document.getElementById("subtotal").innerText = subtotal.toFixed(2);
    document.getElementById("total").innerText = total.toFixed(2);
}

document.addEventListener('input', calculateTotal);
</script>

{% endblock %}
