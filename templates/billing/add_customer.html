{% extends 'base.html' %}

{% block content %}

<div class="d-flex align-items-center justify-content-between mb-4">
    <div>
        <p class="page-sup">
            <a href="/billing/customers/">Customers</a>
            <i class="bi bi-chevron-right" style="font-size:.6rem;margin:0 .3rem;"></i>
            {{ form.instance.id|yesno:"Edit,Add" }}
        </p>
        <h1 class="page-title">{{ form.instance.id|yesno:"Edit Customer,Add Customer" }}</h1>
    </div>
</div>

<div class="row">
    <div class="col-12 col-md-7 col-lg-5">
        <div class="bp-card">
            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="bp-label"><i class="bi bi-person-fill me-1"></i>Full Name</label>
                    {{ form.name }}
                </div>
                <div class="mb-3">
                    <label class="bp-label"><i class="bi bi-telephone-fill me-1"></i>Phone</label>
                    {{ form.phone }}
                </div>
                <div class="mb-3">
                    <label class="bp-label"><i class="bi bi-envelope-fill me-1"></i>Email</label>
                    {{ form.email }}
                </div>
                <div class="mb-4">
                    <label class="bp-label"><i class="bi bi-geo-alt-fill me-1"></i>Address</label>
                    {{ form.address }}
                </div>

                <div class="d-flex gap-2">
                    <button class="bp-btn bp-btn-primary" style="flex:1;justify-content:center;">
                        <i class="bi bi-check-circle-fill"></i> Save Customer
                    </button>
                    <a href="/billing/customers/" class="bp-btn bp-btn-ghost" style="flex:0 0 auto;">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
