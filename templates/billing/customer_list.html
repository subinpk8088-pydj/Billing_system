{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between mb-3">
    <h2>Customers</h2>
    <a href="/billing/customers/add/" class="btn btn-primary">+ Add</a>
</div>

<form method="GET" class="mb-3">
    <input type="text" name="q" value="{{ query }}" class="form-control" placeholder="Search customer...">
</form>

<table class="table table-bordered table-hover">
    <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Action</th>
    </tr>

    {% for c in customers %}
    <tr>
        <td>{{ c.name }}</td>
        <td>{{ c.phone }}</td>
        <td>{{ c.email }}</td>
        <td>
            <a href="/billing/customers/edit/{{ c.id }}/" class="btn btn-sm btn-warning">Edit</a>
            <a href="/billing/customers/delete/{{ c.id }}/" class="btn btn-sm btn-danger">Delete</a>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="4">No customers</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
