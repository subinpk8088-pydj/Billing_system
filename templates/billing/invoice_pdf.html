<!DOCTYPE html>
<html>
<body>

<h2>Invoice #{{ invoice.id }}</h2>

<p>{{ invoice.customer_name }}</p>

<table border="1" width="100%">
<tr>
    <th>Product</th>
    <th>Qty</th>
    <th>Total</th>
</tr>

{% for item in items %}
<tr>
    <td>{{ item.product.name }}</td>
    <td>{{ item.quantity }}</td>
    <td>{{ item.get_total }}</td>
</tr>
{% endfor %}

</table>

<h3>Total: ₹{{ invoice.get_total }}</h3>

</body>
</html>
